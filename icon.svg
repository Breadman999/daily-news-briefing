<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#1a1a2e"/>
  <g transform="translate(256,256)">
    <!-- Radio waves -->
    <circle cx="0" cy="0" r="80" fill="none" stroke="#3b82f6" stroke-width="8" opacity="0.3"/>
    <circle cx="0" cy="0" r="120" fill="none" stroke="#3b82f6" stroke-width="6" opacity="0.2"/>
    <circle cx="0" cy="0" r="160" fill="none" stroke="#3b82f6" stroke-width="4" opacity="0.1"/>
    <!-- Center mic -->
    <rect x="-20" y="-50" width="40" height="70" rx="20" fill="#3b82f6"/>
    <path d="M-35,0 a35,35 0 0,0 70,0" fill="none" stroke="#3b82f6" stroke-width="8" stroke-linecap="round"/>
    <line x1="0" y1="35" x2="0" y2="60" stroke="#3b82f6" stroke-width="8" stroke-linecap="round"/>
    <!-- 新闻 text -->
    <text x="0" y="120" text-anchor="middle" fill="#f8fafc" font-family="Inter,sans-serif" font-weight="700" font-size="48">新闻简报</text>
